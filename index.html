<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Legacy Wars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid #fff;
        }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            font-weight: 600;
        }

        /* Main Menu */
        .main-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .menu-card:hover {
            transform: translateY(-5px);
            border-color: #f39c12;
            background: rgba(243, 156, 18, 0.2);
        }

        .menu-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .menu-title {
            font-size: 16px;
            font-weight: bold;
        }

        /* Sections */
        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Battle */
        .enemy-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .enemy-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s;
        }

        .enemy-card:hover {
            transform: translateX(5px);
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.2);
        }

        .enemy-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .enemy-icon {
            font-size: 40px;
        }

        .enemy-details h3 {
            font-size: 16px;
            margin-bottom: 3px;
        }

        .enemy-stats {
            font-size: 12px;
            color: #aaa;
        }

        .fight-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* Back Button */
        .back-btn {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Battle Arena */
        .battle-arena {
            display: none;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .battle-arena.active {
            display: block;
        }

        .fighters {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
        }

        .fighter {
            text-align: center;
            flex: 1;
        }

        .fighter-icon {
            font-size: 80px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hp-bar {
            width: 100%;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            transition: width 0.5s ease;
        }

        .vs {
            font-size: 24px;
            font-weight: bold;
            color: #f39c12;
            margin: 0 20px;
        }

        .battle-log {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
        }

        .log-entry.player { color: #2ecc71; }
        .log-entry.enemy { color: #e74c3c; }
        .log-entry.crit { color: #f39c12; font-weight: bold; }
        .log-entry.loot { color: #9b59b6; }
        .log-entry.win { color: #27ae60; font-weight: bold; }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: #f39c12;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="player-info">
                <div class="avatar" id="playerAvatar">⚔️</div>
                <div>
                    <div style="font-weight: bold;" id="playerName">Загрузка...</div>
                    <div style="font-size: 12px; color: #f39c12;">Ур. <span id="playerLevel">1</span></div>
                </div>
            </div>
            <div class="stats">
                <div class="stat">
                    <span>❤️</span>
                    <span id="playerHp">100/100</span>
                </div>
                <div class="stat">
                    <span>💰</span>
                    <span id="playerGold">0</span>
                </div>
            </div>
        </div>

        <!-- Main Menu -->
        <div class="main-menu" id="mainMenu">
            <div class="menu-card" onclick="showSection('battle')">
                <div class="menu-icon">⚔️</div>
                <div class="menu-title">БИТВА</div>
            </div>
            <div class="menu-card" onclick="showSection('inventory')">
                <div class="menu-icon">🎒</div>
                <div class="menu-title">ИНВЕНТАРЬ</div>
            </div>
            <div class="menu-card" onclick="showSection('profile')">
                <div class="menu-icon">📊</div>
                <div class="menu-title">ПРОФИЛЬ</div>
            </div>
            <div class="menu-card" onclick="showSection('shop')">
                <div class="menu-icon">🏪</div>
                <div class="menu-title">МАГАЗИН</div>
            </div>
        </div>

        <!-- Battle Section -->
        <div class="section" id="battleSection">
            <h2 class="section-title">⚔️ ВЫБЕРИ ПРОТИВНИКА</h2>
            <div class="enemy-list" id="enemyList"></div>
            <button class="back-btn" onclick="showMainMenu()">↩️ Назад в меню</button>
        </div>

        <!-- Battle Arena -->
        <div class="battle-arena" id="battleArena">
            <h2 class="section-title">⚔️ БИТВА</h2>
            <div class="fighters">
                <div class="fighter">
                    <div class="fighter-icon" id="playerFighterIcon">⚔️</div>
                    <div style="font-weight: bold;">Ты</div>
                    <div class="hp-bar">
                        <div class="hp-fill" id="playerHpFill" style="width: 100%"></div>
                    </div>
                </div>
                <div class="vs">VS</div>
                <div class="fighter">
                    <div class="fighter-icon" id="enemyFighterIcon">🐀</div>
                    <div style="font-weight: bold;" id="enemyName">Враг</div>
                    <div class="hp-bar">
                        <div class="hp-fill" id="enemyHpFill" style="width: 100%"></div>
                    </div>
                </div>
            </div>
            <div class="battle-log" id="battleLog"></div>
            <button class="back-btn" onclick="backToEnemies()">↩️ Назад к выбору</button>
        </div>

        <!-- Inventory Section -->
        <div class="section" id="inventorySection">
            <h2 class="section-title">🎒 ИНВЕНТАРЬ</h2>
            <div id="inventoryList" style="text-align: center; padding: 20px;">Загрузка...</div>
            <button class="back-btn" onclick="showMainMenu()">↩️ Назад в меню</button>
        </div>

        <!-- Profile Section -->
        <div class="section" id="profileSection">
            <h2 class="section-title">📊 ПРОФИЛЬ</h2>
            <div id="profileInfo" style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
                Загрузка...
            </div>
            <button class="back-btn" onclick="showMainMenu()">↩️ Назад в меню</button>
        </div>

        <!-- Shop Section -->
        <div class="section" id="shopSection">
            <h2 class="section-title">🏪 МАГАЗИН</h2>
            <div id="shopList" style="text-align: center; padding: 20px;">Загрузка...</div>
            <button class="back-btn" onclick="showMainMenu()">↩️ Назад в меню</button>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Загрузка игры...</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let gameState = {
            player: null,
            currentEnemy: null,
            battleInProgress: false
        };

        const enemies = [
            { id: 0, name: 'Крыса', icon: '🐀', level: 1, hp: 30, atk: 5, exp: 10, gold: 5 },
            { id: 1, name: 'Волк', icon: '🐺', level: 3, hp: 60, atk: 12, exp: 25, gold: 15 },
            { id: 2, name: 'Медведь', icon: '🐻', level: 5, hp: 120, atk: 20, exp: 50, gold: 40 },
            { id: 3, name: 'Орк', icon: '👹', level: 10, hp: 200, atk: 35, exp: 120, gold: 100 },
            { id: 4, name: 'Дракон', icon: '🐉', level: 20, hp: 500, atk: 60, exp: 500, gold: 1000 }
        ];

        window.onload = async function() {
            document.getElementById('loading').style.display = 'block';
            await loadPlayerData();
            document.getElementById('loading').style.display = 'none';
            showMainMenu();
        };

        async function loadPlayerData() {
            tg.sendData(JSON.stringify({ action: 'get_profile' }));
        }

        function showMainMenu() {
            hideAllSections();
            document.getElementById('mainMenu').style.display = 'grid';
            document.getElementById('battleArena').classList.remove('active');
        }

        function showSection(sectionName) {
            hideAllSections();
            document.getElementById('mainMenu').style.display = 'none';
            
            if (sectionName === 'battle') {
                document.getElementById('battleSection').classList.add('active');
                renderEnemyList();
            } else if (sectionName === 'inventory') {
                document.getElementById('inventorySection').classList.add('active');
                loadInventory();
            } else if (sectionName === 'profile') {
                document.getElementById('profileSection').classList.add('active');
                showProfile();
            } else if (sectionName === 'shop') {
                document.getElementById('shopSection').classList.add('active');
                loadShop();
            }
        }

        function hideAllSections() {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        }

        function renderEnemyList() {
            const list = document.getElementById('enemyList');
            list.innerHTML = '';
            enemies.forEach(enemy => {
                const card = document.createElement('div');
                card.className = 'enemy-card';
                card.innerHTML = `
                    <div class="enemy-info">
                        <div class="enemy-icon">${enemy.icon}</div>
                        <div class="enemy-details">
                            <h3>${enemy.name}</h3>
                            <div class="enemy-stats">Ур. ${enemy.level} | HP: ${enemy.hp} | ATK: ${enemy.atk}</div>
                        </div>
                    </div>
                    <button class="fight-btn" onclick="startBattle(${enemy.id})">⚔️ БОЙ</button>
                `;
                list.appendChild(card);
            });
        }

        function backToEnemies() {
            document.getElementById('battleArena').classList.remove('active');
            document.getElementById('battleSection').classList.add('active');
            gameState.battleInProgress = false;
        }

        async function startBattle(enemyId) {
            const enemy = enemies[enemyId];
            gameState.currentEnemy = { ...enemy };
            gameState.battleInProgress = true;

            document.getElementById('battleSection').classList.remove('active');
            document.getElementById('battleArena').classList.add('active');
            document.getElementById('battleLog').innerHTML = '';

            document.getElementById('enemyFighterIcon').textContent = enemy.icon;
            document.getElementById('enemyName').textContent = enemy.name;
            
            addLogEntry(`⚔️ Бой начался! Ты сражаешься против ${enemy.name}!`, 'normal');
            await battleLoop();
        }

        async function battleLoop() {
            const player = gameState.player;
            const enemy = gameState.currentEnemy;
            let enemyHp = enemy.hp;
            let playerHp = player.hp;

            updateHpBars(playerHp, enemyHp);

            while (playerHp > 0 && enemyHp > 0) {
                await sleep(800);

                // Player attack
                const playerDmg = Math.max(1, player.atk + Math.floor(Math.random() * 5));
                const isCrit = Math.random() < 0.1;
                const finalDmg = isCrit ? Math.floor(playerDmg * 1.5) : playerDmg;
                
                enemyHp -= finalDmg;
                addLogEntry(`🗡️ Ты нанёс ${finalDmg} урона${isCrit ? ' 💥КРИТ!' : ''}`, 'player');
                updateHpBars(playerHp, enemyHp);
                
                if (enemyHp <= 0) break;

                await sleep(800);

                // Enemy attack
                const enemyDmg = Math.max(1, enemy.atk - Math.floor(player.def / 2));
                playerHp -= enemyDmg;
                addLogEntry(`💔 ${enemy.name} нанёс ${enemyDmg} урона`, 'enemy');
                updateHpBars(playerHp, enemyHp);
            }

            await sleep(1000);
            
            if (playerHp <= 0) {
                addLogEntry(`💀 Ты пал в бою...`, 'lose');
            } else {
                const goldGain = enemy.gold;
                const expGain = enemy.exp;
                
                addLogEntry(`🏆 ПОБЕДА!`, 'win');
                addLogEntry(`⭐ Получено: ${expGain} опыта`, 'loot');
                addLogEntry(`💰 Получено: ${goldGain} золота`, 'loot');

                // Update player
                player.gold += goldGain;
                player.hp = Math.max(1, playerHp);
                updateUI();

                tg.sendData(JSON.stringify({ 
                    action: 'battle_result', 
                    win: true, 
                    enemy_id: enemy.id,
                    gold: goldGain,
                    exp: expGain 
                }));
            }

            gameState.battleInProgress = false;
        }

        function updateHpBars(playerHp, enemyHp) {
            const playerMax = gameState.player.hp_max || 100;
            const enemyMax = gameState.currentEnemy.hp;
            
            document.getElementById('playerHpFill').style.width = `${(playerHp / playerMax) * 100}%`;
            document.getElementById('enemyHpFill').style.width = `${(enemyHp / enemyMax) * 100}%`;
        }

        function addLogEntry(text, type) {
            const log = document.getElementById('battleLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = text;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function loadInventory() {
            tg.sendData(JSON.stringify({ action: 'get_inventory' }));
        }

        function showProfile() {
            const p = gameState.player;
            if (!p) {
                document.getElementById('profileInfo').innerHTML = 'Загрузка...';
                return;
            }
            
            document.getElementById('profileInfo').innerHTML = `
                <div style="margin-bottom: 10px;"><strong>${p.name}</strong></div>
                <div>Уровень: ${p.level}</div>
                <div>HP: ${p.hp}/${p.hp_max}</div>
                <div>Атака: ${p.atk}</div>
                <div>Защита: ${p.def}</div>
                <div>Золото: ${p.gold}</div>
            `;
        }

        function loadShop() {
            document.getElementById('shopList').innerHTML = '<div>🔜 Скоро будет доступно!</div>';
        }

        function updateUI() {
            const p = gameState.player;
            if (!p) return;
            
            document.getElementById('playerName').textContent = p.name;
            document.getElementById('playerLevel').textContent = p.level;
            document.getElementById('playerHp').textContent = `${p.hp}/${p.hp_max}`;
            document.getElementById('playerGold').textContent = p.gold;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Handle messages from bot
        tg.onEvent('message', (data) => {
            try {
                const response = JSON.parse(data);
                console.log('Bot response:', response);

                if (response.success && response.profile) {
                    gameState.player = response.profile;
                    updateUI();
                }

                if (response.success && response.inventory !== undefined) {
                    const inv = response.inventory;
                    if (inv.length === 0) {
                        document.getElementById('inventoryList').innerHTML = '🎒 Инвентарь пуст';
                    } else {
                        document.getElementById('inventoryList').innerHTML = inv.map(item => 
                            `<div style="padding: 10px; background: rgba(255,255,255,0.1); margin: 5px 0; border-radius: 10px;">
                                ${item.name} x${item.quantity}
                            </div>`
                        ).join('');
                    }
                }
            } catch (e) {
                console.error('Parse error:', e);
            }
        });
    </script>
</body>
</html>
