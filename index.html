<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Wars - Эпическая RPG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Тот же CSS, что и раньше - оставляем без изменений */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
               background: linear-gradient(135deg, #0a0f1e 0%, #1a1f35 100%); 
               min-height: 100vh; color: #fff; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .game-title { font-size: 2.5em; text-align: center; margin: 20px 0; }
        .character-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
        .character-card { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; }
        .character-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.2); }
        .character-emoji { font-size: 4em; }
        .stats { display: flex; justify-content: space-around; margin: 15px 0; }
        .input-group { margin: 20px 0; }
        #character-name { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); 
                         border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; color: white; }
        .create-btn { width: 100%; padding: 15px; background: #4ecdc4; color: white; 
                     border: none; border-radius: 10px; font-size: 1.2em; cursor: pointer; margin: 10px 0; }
        .characters-list { margin: 20px 0; }
        .character-item { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 15px; 
                         margin: 10px 0; display: flex; justify-content: space-between; cursor: pointer; }
        .character-item:hover { background: rgba(255,255,255,0.2); }
        .back-btn { padding: 12px 20px; background: rgba(255,255,255,0.1); color: white; 
                   border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; cursor: pointer; margin-top: 20px; }
        .notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
                       background: #4ecdc4; color: white; padding: 15px 30px; border-radius: 50px; z-index: 1000; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="game-title">⚔️ LEGACY WARS ⚔️</h1>
        
        <!-- Кнопки навигации -->
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="create-btn" onclick="showScreen('char-select')" style="flex:1;">⚔️ НОВЫЙ ГЕРОЙ</button>
            <button class="create-btn" onclick="loadCharacters()" style="flex:1;">📋 МОИ ГЕРОИ</button>
        </div>
        
        <!-- Экран выбора класса -->
        <div id="char-select" style="display: none;">
            <h2>⚔️ ВЫБЕРИ ГЕРОЯ</h2>
            <div class="character-grid">
                <div class="character-card" onclick="selectClass('warrior')" id="card-warrior">
                    <div class="character-emoji">⚔️</div>
                    <h3>ВОИН</h3>
                    <div class="stats">
                        <span>❤️ 120</span>
                        <span>⚔️ 15</span>
                        <span>🛡️ 15</span>
                    </div>
                </div>
                <div class="character-card" onclick="selectClass('mage')" id="card-mage">
                    <div class="character-emoji">🔮</div>
                    <h3>МАГ</h3>
                    <div class="stats">
                        <span>❤️ 80</span>
                        <span>⚔️ 20</span>
                        <span>🛡️ 5</span>
                    </div>
                </div>
                <div class="character-card" onclick="selectClass('archer')" id="card-archer">
                    <div class="character-emoji">🏹</div>
                    <h3>ЛУЧНИК</h3>
                    <div class="stats">
                        <span>❤️ 90</span>
                        <span>⚔️ 18</span>
                        <span>🛡️ 8</span>
                    </div>
                </div>
            </div>
            
            <div id="name-input" style="display: none;">
                <input type="text" id="character-name" placeholder="Введи имя героя" maxlength="20">
                <button class="create-btn" onclick="createCharacter()">✨ СОЗДАТЬ ГЕРОЯ</button>
            </div>
            <button class="back-btn" onclick="hideScreen('char-select')">← НАЗАД</button>
        </div>
        
        <!-- Список героев -->
        <div id="characters-list" style="display: block;">
            <h2>📋 МОИ ГЕРОИ</h2>
            <div id="characters-container">
                <p style="text-align: center; color: rgba(255,255,255,0.5);">Загрузка...</p>
            </div>
            <button class="back-btn" onclick="location.reload()">🔄 ОБНОВИТЬ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let selectedClass = null;
        
        // Показать экран
        function showScreen(screenId) {
            document.getElementById('char-select').style.display = 'block';
            document.getElementById('characters-list').style.display = 'none';
        }
        
        function hideScreen(screenId) {
            document.getElementById('char-select').style.display = 'none';
            document.getElementById('characters-list').style.display = 'block';
            loadCharacters();
        }
        
        // Выбор класса
        function selectClass(className) {
            document.querySelectorAll('.character-card').forEach(c => 
                c.style.border = '2px solid transparent');
            event.currentTarget.style.border = '2px solid #4ecdc4';
            selectedClass = className;
            document.getElementById('name-input').style.display = 'block';
        }
        
        // Создание персонажа
        function createCharacter() {
            const name = document.getElementById('character-name').value.trim();
            
            if (!selectedClass) {
                showNotification('❌ Выбери класс!');
                return;
            }
            
            if (!name) {
                showNotification('❌ Введи имя!');
                return;
            }
            
            // Отправляем в бота
            tg.sendData(JSON.stringify({
                action: 'create_character',
                class: selectedClass,
                name: name
            }));
            
            showNotification('✨ Персонаж создается...');
            
            setTimeout(() => {
                document.getElementById('character-name').value = '';
                document.getElementById('name-input').style.display = 'none';
                loadCharacters();
                hideScreen('char-select');
            }, 1000);
        }
        
        // Загрузка персонажей из бота
        function loadCharacters() {
            document.getElementById('characters-container').innerHTML = 
                '<p style="text-align: center;">Загрузка...</p>';
            
            tg.sendData(JSON.stringify({
                action: 'get_characters'
            }));
        }
        
        // Обработка данных от бота
        tg.onEvent('web_app_data_sent', function() {
            console.log('Data sent to bot');
        });
        
        // Функция для обновления списка (будет вызвана из бота)
        window.updateCharacters = function(data) {
            const container = document.getElementById('characters-container');
            
            if (!data.characters || data.characters.length === 0) {
                container.innerHTML = `
                    <p style="text-align: center; color: rgba(255,255,255,0.5);">
                        У тебя пока нет героев.<br>
                        Создай первого в разделе "⚔️ НОВЫЙ ГЕРОЙ"
                    </p>
                `;
                return;
            }
            
            let html = '';
            data.characters.forEach(char => {
                const emoji = char.class === 'warrior' ? '⚔️' : 
                             char.class === 'mage' ? '🔮' : '🏹';
                html += `
                    <div class="character-item" onclick="selectForBattle(${char.id})">
                        <div>
                            <strong>${char.name}</strong> (ур.${char.level})
                        </div>
                        <div>${emoji}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        };
        
        // Выбор персонажа для битвы
        function selectForBattle(characterId) {
            tg.sendData(JSON.stringify({
                action: 'select_character',
                character_id: characterId
            }));
            showNotification('✅ Герой выбран! Запускай битву!');
        }
        
        function showNotification(text) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = text;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }
        
        // Загружаем персонажей при старте
        loadCharacters();
    </script>
</body>
</html>
