<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Legacy Wars - Battle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header Stats */
        .header {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid #fff;
        }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            font-weight: 600;
        }

        /* Battle Screen */
        .battle-screen {
            display: none;
        }

        .battle-screen.active {
            display: block;
        }

        /* Enemy Selection */
        .enemy-selection {
            display: block;
        }

        .enemy-selection.hidden {
            display: none;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .enemy-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .enemy-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s;
        }

        .enemy-card:hover {
            transform: translateX(5px);
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.2);
        }

        .enemy-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .enemy-icon {
            font-size: 40px;
        }

        .enemy-details h3 {
            font-size: 16px;
            margin-bottom: 3px;
        }

        .enemy-stats {
            font-size: 12px;
            color: #aaa;
        }

        .fight-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        /* Battle Arena */
        .battle-arena {
            display: none;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .battle-arena.active {
            display: block;
        }

        .fighters {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
        }

        .fighter {
            text-align: center;
            flex: 1;
        }

        .fighter-icon {
            font-size: 80px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .fighter-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .hp-bar {
            width: 100%;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            transition: width 0.5s ease;
        }

        .hp-text {
            font-size: 12px;
            margin-top: 3px;
        }

        .vs {
            font-size: 24px;
            font-weight: bold;
            color: #f39c12;
            margin: 0 20px;
        }

        /* Battle Log */
        .battle-log {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-entry.player {
            color: #2ecc71;
        }

        .log-entry.enemy {
            color: #e74c3c;
        }

        .log-entry.crit {
            color: #f39c12;
            font-weight: bold;
        }

        .log-entry.loot {
            color: #9b59b6;
        }

        .log-entry.win {
            color: #27ae60;
            font-weight: bold;
            font-size: 16px;
        }

        .log-entry.lose {
            color: #c0392b;
            font-weight: bold;
            font-size: 16px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .back-btn {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
        }

        /* Damage Animation */
        .damage-popup {
            position: fixed;
            font-size: 32px;
            font-weight: bold;
            color: #e74c3c;
            pointer-events: none;
            animation: damageFloat 1s ease-out forwards;
            z-index: 1000;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        @keyframes damageFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.5);
            }
        }

        .damage-popup.crit {
            color: #f39c12;
            font-size: 40px;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: #f39c12;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Navigation */
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="player-info">
                <div class="avatar" id="playerAvatar">⚔️</div>
                <div>
                    <div style="font-weight: bold;" id="playerName">Игрок</div>
                    <div style="font-size: 12px; color: #f39c12;">Ур. <span id="playerLevel">1</span></div>
                </div>
            </div>
            <div class="stats">
                <div class="stat">
                    <span>❤️</span>
                    <span id="playerHp">100/100</span>
                </div>
                <div class="stat">
                    <span>💰</span>
                    <span id="playerGold">100</span>
                </div>
            </div>
        </div>

        <!-- Enemy Selection -->
        <div class="enemy-selection" id="enemySelection">
            <h1 class="title">⚔️ ВЫБЕРИ ПРОТИВНИКА</h1>
            <div class="enemy-list" id="enemyList">
                <!-- Enemies will be loaded here -->
            </div>
        </div>

        <!-- Battle Arena -->
        <div class="battle-arena" id="battleArena">
            <h1 class="title">⚔️ БИТВА</h1>
            
            <div class="fighters">
                <div class="fighter">
                    <div class="fighter-icon" id="playerFighterIcon">⚔️</div>
                    <div class="fighter-name" id="playerFighterName">Игрок</div>
                    <div class="hp-bar">
                        <div class="hp-fill" id="playerHpFill" style="width: 100%"></div>
                    </div>
                    <div class="hp-text" id="playerHpText">100/100</div>
                </div>
                
                <div class="vs">VS</div>
                
                <div class="fighter">
                    <div class="fighter-icon" id="enemyFighterIcon">🐀</div>
                    <div class="fighter-name" id="enemyFighterName">Крыса</div>
                    <div class="hp-bar">
                        <div class="hp-fill" id="enemyHpFill" style="width: 100%"></div>
                    </div>
                    <div class="hp-text" id="enemyHpText">30/30</div>
                </div>
            </div>

            <div class="battle-log" id="battleLog">
                <!-- Battle log entries -->
            </div>

            <div class="action-buttons">
                <button class="action-btn back-btn" onclick="backToSelection()" id="backBtn">↩️ Назад</button>
            </div>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Загрузка...</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Game State
        let gameState = {
            player: {
                name: 'Игрок',
                level: 1,
                hp: 100,
                hpMax: 100,
                atk: 15,
                def: 10,
                crit: 5,
                gold: 100,
                class: 'warrior'
            },
            currentEnemy: null,
            battleInProgress: false
        };

        // Enemies Data
        const enemies = [
            { id: 0, name: 'Крыса', icon: '🐀', level: 1, hp: 30, atk: 5, exp: 10, gold: 5, drop: ['potion_small'] },
            { id: 1, name: 'Волк', icon: '🐺', level: 3, hp: 60, atk: 12, exp: 25, gold: 15, drop: ['potion_small', 'armor_cloth'] },
            { id: 2, name: 'Медведь', icon: '🐻', level: 5, hp: 120, atk: 20, exp: 50, gold: 40, drop: ['potion_medium', 'armor_leather'] },
            { id: 3, name: 'Змей', icon: '🐍', level: 7, hp: 80, atk: 25, exp: 60, gold: 50, drop: ['dagger_iron'] },
            { id: 4, name: 'Гоблин', icon: '👺', level: 8, hp: 100, atk: 22, exp: 75, gold: 60, drop: ['sword_iron', 'gold_ore'] },
            { id: 5, name: 'Зомби', icon: '🧟', level: 10, hp: 150, atk: 18, exp: 90, gold: 70, drop: ['potion_medium'] },
            { id: 6, name: 'Орк', icon: '👹', level: 12, hp: 200, atk: 35, exp: 120, gold: 100, drop: ['armor_chain', 'sword_steel'] },
            { id: 7, name: 'Паук-гигант', icon: '🕷️', level: 15, hp: 180, atk: 40, exp: 150, gold: 130, drop: ['dagger_shadow'] },
            { id: 8, name: 'Молодой дракон', icon: '🐉', level: 20, hp: 500, atk: 60, exp: 500, gold: 1000, drop: ['dragon_scale', 'armor_plate'] },
            { id: 9, name: 'Демон', icon: '👿', level: 25, hp: 800, atk: 80, exp: 1000, gold: 2000, drop: ['amulet_crit'] }
        ];

        // Items Data
        const items = {
            'potion_small': { name: 'Малое зелье', icon: '🧪' },
            'potion_medium': { name: 'Среднее зелье', icon: '🧪' },
            'armor_cloth': { name: 'Тканевая броня', icon: '👕' },
            'armor_leather': { name: 'Кожаная броня', icon: '🧥' },
            'dagger_iron': { name: 'Железный кинжал', icon: '🗡️' },
            'sword_iron': { name: 'Железный меч', icon: '⚔️' },
            'gold_ore': { name: 'Золотая руда', icon: '⛏️' },
            'armor_chain': { name: 'Кольчуга', icon: '⛓️' },
            'sword_steel': { name: 'Стальной меч', icon: '🗡️' },
            'dagger_shadow': { name: 'Теневой клинок', icon: '🌑' },
            'dragon_scale': { name: 'Чешуя дракона', icon: '🐉' },
            'armor_plate': { name: 'Латы', icon: '🛡️' },
            'amulet_crit': { name: 'Амулет крита', icon: '📿' }
        };

        // Initialize
        window.onload = async function() {
            await loadPlayerData();
            renderEnemyList();
        };

        // Load Player Data from Bot
        async function loadPlayerData() {
            tg.sendData(JSON.stringify({ action: 'get_profile' }));
        }

        // Render Enemy List
        function renderEnemyList() {
            const list = document.getElementById('enemyList');
            list.innerHTML = '';

            enemies.forEach(enemy => {
                const card = document.createElement('div');
                card.className = 'enemy-card';
                card.innerHTML = `
                    <div class="enemy-info">
                        <div class="enemy-icon">${enemy.icon}</div>
                        <div class="enemy-details">
                            <h3>${enemy.name}</h3>
                            <div class="enemy-stats">Ур. ${enemy.level} | HP: ${enemy.hp} | ATK: ${enemy.atk}</div>
                        </div>
                    </div>
                    <button class="fight-btn" onclick="startBattle(${enemy.id})">⚔️ БОЙ</button>
                `;
                list.appendChild(card);
            });
        }

        // Start Battle
        async function startBattle(enemyId) {
            const enemy = enemies[enemyId];
            gameState.currentEnemy = { ...enemy };
            gameState.battleInProgress = true;

            // Update UI
            document.getElementById('enemySelection').classList.add('hidden');
            document.getElementById('battleArena').classList.add('active');
            document.getElementById('battleLog').innerHTML = '';

            // Set fighter info
            document.getElementById('enemyFighterIcon').textContent = enemy.icon;
            document.getElementById('enemyFighterName').textContent = enemy.name;
            updateHpBars();

            // Add battle start log
            addLogEntry(`⚔️ Бой начался! Ты сражаешься против ${enemy.name}!`, 'normal');

            // Start battle loop
            await battleLoop();
        }

        // Battle Loop
        async function battleLoop() {
            const player = gameState.player;
            const enemy = gameState.currentEnemy;
            let round = 0;
            let playerHp = player.hp;
            let enemyHp = enemy.hp;

            while (playerHp > 0 && enemyHp > 0 && round < 50) {
                round++;
                await sleep(800);

                // Player attack
                const playerDmg = calculateDamage(player.atk, 0, player.crit);
                enemyHp -= playerDmg.damage;
                
                let logText = `🗡️ Ты нанёс ${playerDmg.damage} урона`;
                if (playerDmg.isCrit) {
                    logText += ' 💥КРИТ!';
                    showDamagePopup('enemy', playerDmg.damage, true);
                } else {
                    showDamagePopup('enemy', playerDmg.damage, false);
                }
                addLogEntry(logText, 'player');
                
                updateHpBars();
                
                if (enemyHp <= 0) break;

                await sleep(800);

                // Enemy attack
                const enemyDmg = Math.max(1, enemy.atk - Math.floor(player.def / 2));
                const variance = Math.floor(enemyDmg * 0.2);
                const finalDmg = enemyDmg + Math.floor(Math.random() * variance * 2) - variance;
                
                playerHp -= finalDmg;
                addLogEntry(`💔 ${enemy.name} нанёс ${finalDmg} урона`, 'enemy');
                showDamagePopup('player', finalDmg, false);
                
                updateHpBars();
            }

            // Battle end
            await sleep(1000);
            
            if (playerHp <= 0) {
                // Defeat
                addLogEntry(`💀 Ты пал в бою...`, 'lose');
                tg.sendData(JSON.stringify({ 
                    action: 'battle_result', 
                    win: false, 
                    enemy_id: enemy.id 
                }));
            } else {
                // Victory
                const expGain = enemy.exp;
                const goldGain = enemy.gold;
                
                addLogEntry(`🏆 ПОБЕДА!`, 'win');
                addLogEntry(`⭐ Получено: ${expGain} опыта`, 'loot');
                addLogEntry(`💰 Получено: ${goldGain} золота`, 'loot');

                // Drop items
                if (enemy.drop && Math.random() < 0.3) {
                    const dropItem = enemy.drop[Math.floor(Math.random() * enemy.drop.length)];
                    const item = items[dropItem];
                    addLogEntry(`🎁 Выпало: ${item.icon} ${item.name}`, 'loot');
                }

                // Update player stats
                player.gold += goldGain;
                player.hp = Math.max(1, playerHp);
                document.getElementById('playerGold').textContent = player.gold;
                document.getElementById('playerHp').textContent = `${player.hp}/${player.hpMax}`;

                tg.sendData(JSON.stringify({ 
                    action: 'battle_result', 
                    win: true, 
                    enemy_id: enemy.id,
                    gold: goldGain,
                    exp: expGain
                }));
            }

            gameState.battleInProgress = false;
            
            // Show back button
            setTimeout(() => {
                document.getElementById('backBtn').style.display = 'block';
            }, 2000);
        }

        // Calculate Damage
        function calculateDamage(atk, def, critChance) {
            const baseDmg = Math.max(1, atk - Math.floor(def / 2));
            const variance = Math.floor(baseDmg * 0.2);
            let damage = baseDmg + Math.floor(Math.random() * variance * 2) - variance;
            
            const isCrit = Math.random() * 100 <= critChance;
            if (isCrit) {
                damage = Math.floor(damage * 1.5);
            }

            return { damage, isCrit };
        }

        // Update HP Bars
        function updateHpBars() {
            const player = gameState.player;
            const enemy = gameState.currentEnemy;

            if (!enemy) return;

            const playerHpPercent = (player.hp / player.hpMax) * 100;
            const enemyHpPercent = (enemy.hp / enemy.hpMax) * 100;

            document.getElementById('playerHpFill').style.width = `${Math.max(0, playerHpPercent)}%`;
            document.getElementById('enemyHpFill').style.width = `${Math.max(0, enemyHpPercent)}%`;
            document.getElementById('playerHpText').textContent = `${Math.max(0, player.hp)}/${player.hpMax}`;
            document.getElementById('enemyHpText').textContent = `${Math.max(0, enemy.hp)}/${enemy.hpMax}`;
        }

        // Add Log Entry
        function addLogEntry(text, type) {
            const log = document.getElementById('battleLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = text;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        // Show Damage Popup
        function showDamagePopup(target, damage, isCrit) {
            const popup = document.createElement('div');
            popup.className = `damage-popup ${isCrit ? 'crit' : ''}`;
            popup.textContent = `-${damage}`;
            
            const arena = document.getElementById('battleArena');
            const rect = arena.getBoundingClientRect();
            
            if (target === 'enemy') {
                popup.style.left = `${rect.right - 150}px`;
                popup.style.top = `${rect.top + 100}px`;
            } else {
                popup.style.left = `${rect.left + 50}px`;
                popup.style.top = `${rect.top + 100}px`;
            }
            
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        // Back to Selection
        function backToSelection() {
            document.getElementById('battleArena').classList.remove('active');
            document.getElementById('enemySelection').classList.remove('hidden');
            document.getElementById('backBtn').style.display = 'none';
            gameState.currentEnemy = null;
        }

        // Sleep helper
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Handle messages from bot
        tg.onEvent('message', (data) => {
            try {
                const response = JSON.parse(data);
                console.log('Bot response:', response);

                if (response.success && response.profile) {
                    const p = response.profile;
                    gameState.player = {
                        name: p.name,
                        level: p.level,
                        hp: p.hp,
                        hpMax: p.hp_max,
                        atk: p.atk,
                        def: p.def,
                        crit: p.crit,
                        gold: p.gold,
                        class: p.class
                    };

                    // Update UI
                    document.getElementById('playerName').textContent = p.name;
                    document.getElementById('playerLevel').textContent = p.level;
                    document.getElementById('playerHp').textContent = `${p.hp}/${p.hp_max}`;
                    document.getElementById('playerGold').textContent = p.gold;
                }
            } catch (e) {
                console.error('Parse error:', e);
            }
        });
    </script>
</body>
</html>
