<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Wars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
        }
        .game-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center;
            z-index: -2;
            animation: backgroundZoom 30s ease-in-out infinite;
        }
        @keyframes backgroundZoom {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(26,26,46,0.5) 0%, rgba(15,52,96,0.4) 100%);
            z-index: -1;
        }
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .loading.hidden { opacity: 0; pointer-events: none; }
        .loading-logo {
            font-size: 100px;
            margin-bottom: 30px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .loading-spinner {
            width: 60px; height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: #f39c12;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 20px; font-size: 18px; color: #aaa; }
        .game-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: 15px;
        }
        .game-screen.active { display: flex; flex-direction: column; }
        .top-bar {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .player-info { display: flex; align-items: center; gap: 12px; }
        .player-avatar {
            width: 55px; height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border: 3px solid #fff;
            overflow: hidden;
        }
        .player-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .player-details { display: flex; flex-direction: column; }
        .player-name { font-weight: bold; font-size: 16px; }
        .player-level { font-size: 12px; color: #f39c12; }
        .player-stats { display: flex; gap: 15px; }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(255,255,255,0.1);
            padding: 5px 10px;
            border-radius: 10px;
        }
        .character-scene {
            flex: 1;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 50px;
        }
        .character-shadow {
            position: absolute;
            bottom: 80px;
            width: 200px; height: 60px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.6) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(10px);
            animation: shadowPulse 3s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes shadowPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .character-aura {
            position: absolute;
            bottom: 100px;
            width: 280px; height: 280px;
            background: radial-gradient(circle, rgba(243,156,18,0.4) 0%, rgba(231,76,60,0.2) 40%, transparent 70%);
            border-radius: 50%;
            filter: blur(20px);
            animation: auraPulse 3s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes auraPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }
        .character-sprite {
            width: 350px; height: 500px;
            object-fit: contain;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
            animation: characterFloatMain 4s ease-in-out infinite;
            background: transparent;
        }
        @keyframes characterFloatMain {
            0%, 100% { transform: translateY(0) rotateY(0deg); }
            25% { transform: translateY(-15px) rotateY(2deg); }
            75% { transform: translateY(-10px) rotateY(-2deg); }
        }
        .side-buttons {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        .side-btn {
            position: absolute;
            width: 85px; height: 85px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: all;
            transition: all 0.3s;
            border: 2px solid rgba(255,255,255,0.4);
            backdrop-filter: blur(15px);
        }
        .side-btn:active { transform: scale(0.9); }
        .side-btn.battle {
            left: 10px; top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, rgba(231,76,60,0.85), rgba(192,57,43,0.85));
        }
        .side-btn.raid {
            right: 10px; top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, rgba(155,89,182,0.85), rgba(142,68,173,0.85));
        }
        .side-btn.craft {
            left: 10px; bottom: 20px;
            background: linear-gradient(135deg, rgba(46,204,113,0.85), rgba(39,174,96,0.85));
        }
        .side-btn.shop {
            right: 10px; bottom: 20px;
            background: linear-gradient(135deg, rgba(241,196,15,0.85), rgba(243,156,18,0.85));
        }
        .btn-icon { font-size: 36px; margin-bottom: 5px; }
        .btn-label { font-size: 11px; font-weight: bold; }
        .bottom-menu {
            display: flex;
            justify-content: space-around;
            gap: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            backdrop-filter: blur(15px);
        }
        .menu-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 15px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .menu-btn:active { transform: scale(0.95); }
        .menu-icon { font-size: 24px; }
        /* Battle Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(10px);
            z-index: 3000;
            padding: 20px;
        }
        .modal.active { display: flex; flex-direction: column; align-items: center; }
        .modal-content {
            background: linear-gradient(135deg, rgba(26,26,46,0.95), rgba(22,33,62,0.95));
            border-radius: 25px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .modal-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 25px;
            text-align: center;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .close-modal {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 36px;
            cursor: pointer;
            color: #aaa;
        }
        .monster-card {
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s;
        }
        .monster-card:hover {
            transform: translateX(10px);
            border-color: #e74c3c;
            background: rgba(231,76,60,0.25);
        }
        .monster-info { display: flex; align-items: center; gap: 15px; }
        .monster-icon { font-size: 48px; }
        .monster-details h3 { font-size: 16px; margin-bottom: 5px; }
        .monster-stats { font-size: 11px; color: #ccc; }
        .fight-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        /* Battle Log */
        .battle-log {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        .battle-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
        }
        .battle-entry.player { color: #2ecc71; }
        .battle-entry.monster { color: #e74c3c; }
        .battle-entry.crit { color: #f39c12; font-weight: bold; }
        .notification {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(46,204,113,0.95);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 10000;
            animation: slideDown 0.3s ease-out;
        }
        .notification.error { background: rgba(231,76,60,0.95); }
        @keyframes slideDown {
            from { top: -50px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }
        @media (max-width: 480px) {
            .character-sprite { width: 280px; height: 400px; }
            .side-btn { width: 75px; height: 75px; }
        }
    </style>
</head>
<body>
    <div class="game-background"></div>
    <div class="bg-overlay"></div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-logo">⚔️</div>
        <div class="loading-spinner"></div>
        <div class="loading-text">Загрузка Legacy Wars...</div>
    </div>

    <!-- Game Screen -->
    <div class="game-screen" id="gameScreen">
        <div class="top-bar">
            <div class="player-info">
                <div class="player-avatar" id="playerAvatar">
                    <img src="" alt="Avatar" id="playerAvatarImg">
                </div>
                <div class="player-details">
                    <div class="player-name" id="playerName">Игрок</div>
                    <div class="player-level" id="playerLevel">Ур. 1</div>
                </div>
            </div>
            <div class="player-stats">
                <div class="stat-item">❤️ <span id="playerHp">100/100</span></div>
                <div class="stat-item">🪙 <span id="playerGold">100</span></div>
            </div>
        </div>

        <div class="character-scene">
            <div class="character-shadow"></div>
            <div class="character-aura"></div>
            <img src="" alt="Character" class="character-sprite" id="characterSprite">

            <div class="side-buttons">
                <div class="side-btn battle" onclick="openBattle()">
                    <div class="btn-icon">⚔️</div>
                    <div class="btn-label">БИТВА</div>
                </div>
                <div class="side-btn raid" onclick="openRaid()">
                    <div class="btn-icon">👹</div>
                    <div class="btn-label">РЕЙД</div>
                </div>
                <div class="side-btn craft" onclick="openCraft()">
                    <div class="btn-icon">🔨</div>
                    <div class="btn-label">КРАФТ</div>
                </div>
                <div class="side-btn shop" onclick="openShop()">
                    <div class="btn-icon">🏪</div>
                    <div class="btn-label">МАГАЗИН</div>
                </div>
            </div>
        </div>

        <div class="bottom-menu">
            <button class="menu-btn" onclick="showInventory()">
                <span class="menu-icon">🎒</span><span>Инвентарь</span>
            </button>
            <button class="menu-btn" onclick="showProfile()">
                <span class="menu-icon">📊</span><span>Профиль</span>
            </button>
            <button class="menu-btn" onclick="showSettings()">
                <span class="menu-icon">⚙️</span><span>Настройки</span>
            </button>
        </div>
    </div>

    <!-- Battle Modal -->
    <div class="modal" id="battleModal">
        <span class="close-modal" onclick="closeModal('battleModal')">&times;</span>
        <div class="modal-content">
            <h2 class="modal-title">⚔️ ВЫБЕРИ ПРОТИВНИКА</h2>
            <div id="monstersList"></div>
            <div class="battle-log" id="battleLog" style="display: none;"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const CHARACTER_IMAGES = {
            'rogue': 'images/rogue.png',
            'warrior': 'images/warrior.png',
            'mage': 'images/mage.png',
            'paladin': 'images/paladin.png'
        };

        const MONSTERS = [
            { id: 0, name: '🐀 Крыса', level: 1, hp: 30, atk: 5, exp: 10, gold: 5 },
            { id: 1, name: '🐺 Волк', level: 3, hp: 60, atk: 12, exp: 25, gold: 15 },
            { id: 2, name: '🐻 Медведь', level: 5, hp: 120, atk: 20, exp: 50, gold: 40 },
            { id: 3, name: '👹 Орк', level: 10, hp: 200, atk: 35, exp: 120, gold: 100 },
            { id: 4, name: '🐉 Дракон', level: 20, hp: 500, atk: 60, exp: 500, gold: 1000 }
        ];

        let gameState = {
            userId: tg.initDataUnsafe?.user?.id || 0,
            name: tg.initDataUnsafe?.user?.first_name || 'Player',
            characterCreated: false,
            selectedClass: null,
            level: 1,
            hp: 100,
            hpMax: 100,
            gold: 100,
            class: 'warrior'
        };

        window.onload = async function() {
            await sleep(1500);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('gameScreen').classList.add('active');
            loadProfile();
        };

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function loadProfile() {
            tg.sendData(JSON.stringify({ action: 'get_profile' }));
        }

        function updateUI() {
            document.getElementById('playerName').textContent = gameState.name;
            document.getElementById('playerLevel').textContent = `Ур. ${gameState.level}`;
            document.getElementById('playerHp').textContent = `${gameState.hp}/${gameState.hpMax}`;
            document.getElementById('playerGold').textContent = gameState.gold;
            
            const characterImg = CHARACTER_IMAGES[gameState.class] || CHARACTER_IMAGES['warrior'];
            document.getElementById('characterSprite').src = characterImg;
            document.getElementById('playerAvatarImg').src = characterImg;
        }

        function openBattle() {
            const modal = document.getElementById('battleModal');
            const list = document.getElementById('monstersList');
            const battleLog = document.getElementById('battleLog');
            list.innerHTML = '';
            battleLog.style.display = 'none';
            battleLog.innerHTML = '';

            MONSTERS.forEach(monster => {
                const card = document.createElement('div');
                card.className = 'monster-card';
                card.innerHTML = `
                    <div class="monster-info">
                        <div class="monster-icon">${monster.name.split(' ')[0]}</div>
                        <div class="monster-details">
                            <h3>${monster.name}</h3>
                            <div class="monster-stats">Ур. ${monster.level} | HP: ${monster.hp} | ATK: ${monster.atk}</div>
                        </div>
                    </div>
                    <button class="fight-btn" onclick="fightMonster(${monster.id})">⚔️ БОЙ</button>
                `;
                list.appendChild(card);
            });

            modal.classList.add('active');
        }

        async function fightMonster(monsterId) {
            const monster = MONSTERS[monsterId];
            const battleLog = document.getElementById('battleLog');
            battleLog.style.display = 'block';
            battleLog.innerHTML = '<div class="battle-entry">⚔️ Бой начался!</div>';

            tg.sendData(JSON.stringify({ action: 'battle', monster_id: monsterId }));
        }

        function openRaid() { showNotification('👹 Скоро будет!'); }
        function openCraft() { showNotification('🔨 Скоро будет!'); }
        function openShop() { showNotification('🏪 Скоро будет!'); }
        function showInventory() { showNotification('🎒 Скоро будет!'); }
        function showProfile() { showNotification('📊 Скоро будет!'); }
        function showSettings() { showNotification('⚙️ Скоро будет!'); }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function showNotification(message, isError = false) {
            const notif = document.createElement('div');
            notif.className = `notification ${isError ? 'error' : ''}`;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        tg.onEvent('message', (data) => {
            try {
                const response = JSON.parse(data);
                console.log('Bot response:', response);

                if (response.success && response.profile) {
                    const p = response.profile;
                    gameState.name = p.name;
                    gameState.level = p.level;
                    gameState.hp = p.hp;
                    gameState.hpMax = p.hp_max;
                    gameState.gold = p.gold;
                    gameState.class = p.class;
                    updateUI();
                }

                if (response.success && response.battle_log) {
                    const battleLog = document.getElementById('battleLog');
                    battleLog.innerHTML = '';
                    
                    response.battle_log.forEach(entry => {
                        const div = document.createElement('div');
                        div.className = 'battle-entry';
                        
                        if (entry.type === 'player_attack') {
                            div.classList.add('player');
                            if (entry.crit) div.classList.add('crit');
                            div.textContent = `🗡️ Ты нанёс ${entry.damage} урона ${entry.crit ? '💥КРИТ!' : ''}`;
                        } else if (entry.type === 'monster_attack') {
                            div.classList.add('monster');
                            div.textContent = `💔 Враг нанёс ${entry.damage} урона | Твоё HP: ${entry.player_hp}`;
                        }
                        
                        battleLog.appendChild(div);
                    });

                    if (response.win) {
                        battleLog.innerHTML += `<div class="battle-entry crit">🏆 ПОБЕДА! +${response.gold}🪙 +${response.exp}⭐</div>`;
                        if (response.level_up) {
                            battleLog.innerHTML += `<div class="battle-entry crit">🎉 НОВЫЙ УРОВЕНЬ ${response.new_level}!</div>`;
                        }
                        if (response.drop) {
                            battleLog.innerHTML += `<div class="battle-entry crit">🎁 Выпало: ${response.drop}</div>`;
                        }
                        gameState.gold = response.player.gold;
                        gameState.level = response.player.level;
                        gameState.hp = response.player.hp;
                        updateUI();
                    } else {
                        battleLog.innerHTML += '<div class="battle-entry monster">💀 ПОРАЖЕНИЕ...</div>';
                    }
                }
            } catch (e) {
                console.error('Parse error:', e);
            }
        });

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }
    </script>
</body>
</html>
