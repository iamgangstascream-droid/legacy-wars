<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Wars - Отладка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #0a0f1e; color: white; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #ffd700; text-align: center; }
        button { padding: 15px; margin: 5px; background: #4ecdc4; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; }
        .debug-box { background: #1a1f35; padding: 15px; border-radius: 10px; margin: 10px 0; font-size: 12px; }
        .success { color: #4ecdc4; }
        .error { color: #ff6b6b; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ LEGACY WARS - ОТЛАДКА ⚔️</h1>
        
        <div class="debug-box">
            <div id="tg-status">🔄 Проверка Telegram...</div>
            <div id="user-info">👤 Загрузка...</div>
        </div>
        
        <button onclick="testTg()">📤 1. ТЕСТ TELEGRAM API</button>
        <button onclick="testBot()">🤖 2. ТЕСТ ОТПРАВКИ В БОТА</button>
        <button onclick="testFull()">⚡ 3. ТЕСТ СОЗДАНИЯ ПЕРСОНАЖА</button>
        
        <div id="output" class="debug-box" style="min-height: 200px;">
            Жду действий...
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const output = document.getElementById('output');
        
        function log(text, type = 'info') {
            const color = type === 'success' ? '#4ecdc4' : type === 'error' ? '#ff6b6b' : '#fff';
            output.innerHTML += `<div style="color: ${color}; margin: 5px 0;">${text}</div>`;
            console.log(text);
        }
        
        function clearLog() {
            output.innerHTML = '';
        }
        
        // Проверка Telegram
        document.getElementById('tg-status').innerHTML = '✅ Telegram Web App доступен';
        document.getElementById('user-info').innerHTML = `👤 User: ${tg.initDataUnsafe.user?.id || 'Unknown'}`;
        
        tg.ready();
        tg.expand();
        
        // Тест 1: Проверка Telegram API
        function testTg() {
            clearLog();
            log('🔍 ТЕСТ TELEGRAM API');
            log(`Версия: ${tg.version || 'unknown'}`);
            log(`Platform: ${tg.platform || 'unknown'}`);
            log(`Theme: ${tg.colorScheme || 'unknown'}`);
            log(`User ID: ${tg.initDataUnsafe.user?.id || 'нет'}`);
            log(`User name: ${tg.initDataUnsafe.user?.first_name || 'нет'}`);
            
            if (tg.initDataUnsafe.user?.id) {
                log('✅ Telegram данные получены', 'success');
            } else {
                log('❌ Нет данных пользователя! Игра должна открываться через Telegram', 'error');
            }
        }
        
        // Тест 2: Отправка в бота
        function testBot() {
            clearLog();
            log('📤 ТЕСТ ОТПРАВКИ В БОТА');
            
            const testData = {
                action: 'test_connection',
                timestamp: Date.now(),
                user_id: tg.initDataUnsafe.user?.id
            };
            
            const jsonData = JSON.stringify(testData);
            log(`Отправляем: ${jsonData}`);
            
            try {
                tg.sendData(jsonData);
                log('✅ Данные отправлены!', 'success');
                log('📺 Проверь консоль бота - там должны быть логи');
            } catch (e) {
                log(`❌ Ошибка отправки: ${e.message}`, 'error');
            }
        }
        
        // Тест 3: Полный тест создания персонажа
        function testFull() {
            clearLog();
            log('⚡ ТЕСТ СОЗДАНИЯ ПЕРСОНАЖА');
            
            const testChar = {
                action: 'create_character',
                class: 'warrior',
                name: `Тест${Math.floor(Math.random() * 1000)}`
            };
            
            const jsonData = JSON.stringify(testChar);
            log(`Данные для отправки: ${jsonData}`);
            
            try {
                tg.sendData(jsonData);
                log('✅ Данные отправлены!', 'success');
                log('1️⃣ Проверь консоль бота');
                log('2️⃣ Должно появиться сообщение "ПОЛУЧЕНЫ ДАННЫЕ ИЗ MINI APP"');
                log('3️⃣ Если не появилось - проблема в боте');
            } catch (e) {
                log(`❌ Ошибка: ${e.message}`, 'error');
            }
        }
        
        // Автотест при загрузке
        setTimeout(() => {
            log('🔄 Автоматическая проверка...');
            testTg();
        }, 1000);
    </script>
</body>
</html>
