<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Legacy Wars - Tap Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f39c12, #e74c3c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 3px solid #fff;
        }

        .balance-container {
            text-align: right;
        }

        .balance {
            font-size: 24px;
            font-weight: bold;
            color: #f39c12;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .level {
            font-size: 14px;
            color: #aaa;
        }

        /* Main Click Area */
        .click-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .character {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, #e74c3c 0%, #c0392b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 120px;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 0 50px rgba(231, 76, 60, 0.5);
            border: 5px solid rgba(255,255,255,0.2);
            position: relative;
            z-index: 10;
        }

        .character:active {
            transform: scale(0.95);
        }

        .character.clicked {
            animation: clickAnimation 0.1s ease-out;
        }

        @keyframes clickAnimation {
            0% { transform: scale(1); }
            50% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* Floating Numbers */
        .float-number {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            color: #f39c12;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 100;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }

        /* Energy Bar */
        .energy-container {
            width: 100%;
            margin: 20px 0;
        }

        .energy-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .energy-bar {
            width: 100%;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            border-radius: 10px;
            transition: width 0.3s ease;
            position: relative;
        }

        .energy-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255,255,255,0.3) 50%, 
                transparent 100%);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Navigation */
        .nav {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 2px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            border-radius: 15px 15px 0 0;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
            transition: color 0.3s;
        }

        .nav-btn.active {
            color: #f39c12;
        }

        .nav-btn-icon {
            font-size: 24px;
        }

        /* Panels */
        .panel {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
        }

        .panel.active {
            display: block;
        }

        /* Upgrade Cards */
        .upgrade-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .upgrade-info h3 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .upgrade-info p {
            font-size: 12px;
            color: #aaa;
        }

        .upgrade-btn {
            background: linear-gradient(45deg, #f39c12, #e74c3c);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upgrade-btn:active {
            transform: scale(0.95);
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: #f39c12;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(46, 204, 113, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 1000;
            animation: slideDown 0.3s ease-out;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .notification.error {
            background: rgba(231, 76, 60, 0.9);
        }

        @keyframes slideDown {
            from { top: -50px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #f39c12;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Загрузка Legacy Wars...</p>
    </div>

    <div class="container" id="app" style="display: none;">
        <!-- Header -->
        <div class="header">
            <div class="player-info">
                <div class="avatar" id="avatar">⚔️</div>
                <div>
                    <div class="level" id="levelDisplay">Уровень 1</div>
                    <div style="font-size: 12px; color: #aaa;" id="nameDisplay">Игрок</div>
                </div>
            </div>
            <div class="balance-container">
                <div class="balance">
                    <span>💰</span>
                    <span id="balance">0</span>
                </div>
            </div>
        </div>

        <!-- Game Panel -->
        <div class="panel active" id="gamePanel">
            <div class="click-area">
                <div class="character" id="character">🐉</div>
            </div>

            <div class="energy-container">
                <div class="energy-info">
                    <span>⚡ Энергия</span>
                    <span id="energyText">1000/1000</span>
                </div>
                <div class="energy-bar">
                    <div class="energy-fill" id="energyFill" style="width: 100%;"></div>
                </div>
            </div>
        </div>

        <!-- Upgrades Panel -->
        <div class="panel" id="upgradesPanel">
            <h2 style="margin-bottom: 20px;">🛒 Улучшения</h2>
            
            <div class="upgrade-card">
                <div class="upgrade-info">
                    <h3>💪 Сила клика</h3>
                    <p>+1 к силе тапа</p>
                    <p style="color: #f39c12;" id="tapPowerCost">Цена: 100 💰</p>
                </div>
                <button class="upgrade-btn" id="buyTapPower" onclick="buyUpgrade('tap_power')">
                    Купить
                </button>
            </div>

            <div class="upgrade-card">
                <div class="upgrade-info">
                    <h3>⚡ Макс. энергия</h3>
                    <p>+500 к энергии</p>
                    <p style="color: #f39c12;" id="energyCost">Цена: 200 💰</p>
                </div>
                <button class="upgrade-btn" id="buyEnergy" onclick="buyUpgrade('energy_max')">
                    Купить
                </button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="statTapPower">1</div>
                    <div class="stat-label">Сила клика</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statEnergyMax">1000</div>
                    <div class="stat-label">Макс. энергия</div>
                </div>
            </div>
        </div>

        <!-- Profile Panel -->
        <div class="panel" id="profilePanel">
            <h2 style="margin-bottom: 20px;">📊 Профиль</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="statLevel">1</div>
                    <div class="stat-label">Уровень</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statGold">0</div>
                    <div class="stat-label">Золото</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statExp">0</div>
                    <div class="stat-label">Опыт</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statClass">⚔️</div>
                    <div class="stat-label">Класс</div>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav">
            <button class="nav-btn active" onclick="showPanel('game')">
                <span class="nav-btn-icon">🎮</span>
                <span>Игра</span>
            </button>
            <button class="nav-btn" onclick="showPanel('upgrades')">
                <span class="nav-btn-icon">🛒</span>
                <span>Улучшения</span>
            </button>
            <button class="nav-btn" onclick="showPanel('profile')">
                <span class="nav-btn-icon">📊</span>
                <span>Профиль</span>
            </button>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Состояние игры
        let gameState = {
            userId: tg.initDataUnsafe?.user?.id || 0,
            name: tg.initDataUnsafe?.user?.first_name || 'Игрок',
            balance: 0,
            energy: 1000,
            energyMax: 1000,
            tapPower: 1,
            level: 1,
            exp: 0,
            class: 'warrior',
            lastEnergyUpdate: Date.now()
        };

        // Цены улучшений
        const upgradePrices = {
            tap_power: 100,
            energy_max: 200
        };

        // Загрузка данных
        async function loadProfile() {
            try {
                // Пытаемся получить данные от бота
                tg.sendData(JSON.stringify({ action: 'get_profile' }));
                
                // Для демо-режима используем локальные данные
                const saved = localStorage.getItem('legacyWarsSave');
                if (saved) {
                    gameState = { ...gameState, ...JSON.parse(saved) };
                }
                
                updateUI();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            } catch (e) {
                console.error('Load error:', e);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            }
        }

        // Обновление интерфейса
        function updateUI() {
            document.getElementById('balance').textContent = gameState.balance.toLocaleString();
            document.getElementById('energyText').textContent = `${Math.floor(gameState.energy)}/${gameState.energyMax}`;
            document.getElementById('energyFill').style.width = `${(gameState.energy / gameState.energyMax) * 100}%`;
            document.getElementById('levelDisplay').textContent = `Уровень ${gameState.level}`;
            document.getElementById('nameDisplay').textContent = gameState.name;
            
            // Статистика
            document.getElementById('statTapPower').textContent = gameState.tapPower;
            document.getElementById('statEnergyMax').textContent = gameState.energyMax;
            document.getElementById('statLevel').textContent = gameState.level;
            document.getElementById('statGold').textContent = gameState.balance.toLocaleString();
            
            // Цены
            document.getElementById('tapPowerCost').textContent = `Цена: ${upgradePrices.tap_power} 💰`;
            document.getElementById('energyCost').textContent = `Цена: ${upgradePrices.energy_max} 💰`;
            
            // Кнопки
            document.getElementById('buyTapPower').disabled = gameState.balance < upgradePrices.tap_power;
            document.getElementById('buyEnergy').disabled = gameState.balance < upgradePrices.energy_max;
        }

        // Регенерация энергии
        function regenerateEnergy() {
            const now = Date.now();
            const elapsed = (now - gameState.lastEnergyUpdate) / 1000;
            const regen = elapsed * 1; // 1 энергия в секунду
            
            if (gameState.energy < gameState.energyMax) {
                gameState.energy = Math.min(gameState.energyMax, gameState.energy + regen);
                gameState.lastEnergyUpdate = now;
                updateUI();
                saveGame();
            }
        }

        // Сохранение игры
        function saveGame() {
            localStorage.setItem('legacyWarsSave', JSON.stringify(gameState));
        }

        // Клик по персонажу
        const character = document.getElementById('character');
        character.addEventListener('click', (e) => {
            if (gameState.energy < gameState.tapPower) {
                showNotification('⚡ Недостаточно энергии!', true);
                return;
            }

            // Вибрация
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            // Анимация
            character.classList.add('clicked');
            setTimeout(() => character.classList.remove('clicked'), 100);

            // Плавающая цифра
            const floatNum = document.createElement('div');
            floatNum.className = 'float-number';
            floatNum.textContent = `+${gameState.tapPower}`;
            floatNum.style.left = `${e.clientX - 20}px`;
            floatNum.style.top = `${e.clientY - 40}px`;
            document.body.appendChild(floatNum);
            setTimeout(() => floatNum.remove(), 1000);

            // Обновление состояния
            gameState.balance += gameState.tapPower;
            gameState.energy -= gameState.tapPower;
            gameState.lastEnergyUpdate = Date.now();
            
            updateUI();
            saveGame();

            // Отправка данных боту (пакетная)
            sendTapData();
        });

        // Пакетная отправка тапов
        let tapBuffer = { clicks: 0, energy: 0 };
        let sendTimeout = null;

        function sendTapData() {
            tapBuffer.clicks += 1;
            tapBuffer.energy += gameState.tapPower;

            if (sendTimeout) clearTimeout(sendTimeout);
            
            sendTimeout = setTimeout(() => {
                if (tapBuffer.clicks > 0) {
                    tg.sendData(JSON.stringify({
                        action: 'tap',
                        clicks: tapBuffer.clicks,
                        energy: tapBuffer.energy
                    }));
                    tapBuffer = { clicks: 0, energy: 0 };
                }
            }, 2000); // Отправляем каждые 2 секунды
        }

        // Покупка улучшений
        async function buyUpgrade(type) {
            const price = upgradePrices[type];
            
            if (gameState.balance < price) {
                showNotification('❌ Недостаточно золота!', true);
                return;
            }

            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            gameState.balance -= price;
            
            if (type === 'tap_power') {
                gameState.tapPower += 1;
                upgradePrices.tap_power = Math.floor(upgradePrices.tap_power * 1.5);
            } else if (type === 'energy_max') {
                gameState.energyMax += 500;
                gameState.energy += 500;
                upgradePrices.energy_max = Math.floor(upgradePrices.energy_max * 1.3);
            }

            showNotification('✅ Улучшение куплено!');
            updateUI();
            saveGame();

            // Отправка боту
            tg.sendData(JSON.stringify({
                action: 'buy_upgrade',
                upgrade: type,
                cost: price
            }));
        }

        // Переключение панелей
        function showPanel(panelName) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`${panelName}Panel`).classList.add('active');
            event.currentTarget.classList.add('active');
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.selectionChanged();
            }
        }

        // Уведомления
        function showNotification(message, isError = false) {
            const notif = document.createElement('div');
            notif.className = `notification ${isError ? 'error' : ''}`;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // Обработка данных от бота
        tg.onEvent('message', (data) => {
            try {
                const response = JSON.parse(data);
                if (response.success && response.profile) {
                    gameState = { ...gameState, ...response.profile };
                    updateUI();
                    saveGame();
                }
            } catch (e) {
                console.error('Message parse error:', e);
            }
        });

        // Запуск
        setInterval(regenerateEnergy, 1000);
        loadProfile();
    </script>
</body>
</html>
